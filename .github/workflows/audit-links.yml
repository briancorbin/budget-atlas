name: Audit links

# Runs the public link audit nightly: extracts every external URL cited
# from the citation registry, probes each with curl, persists the run to
# the D1-backed audit API, and refreshes the rolling broken-citation
# issue.
#
# Manual runs welcome via the "Run workflow" button on the Actions tab.
#
# TODO(audit-ci): add a separate `pull_request` workflow that enforces
# the unified-resolution-log rule — any PR closing an audit:link or
# audit:review issue (via Closes/Fixes/Resolves #N) must add ≥1 row to
# audit/links/reviewed.tsv. Defer until either (a) we forget the
# convention in practice, or (b) someone other than the maintainer
# files the first audit-resolving PR. See audit/links/README.md
# "unified resolution log".

on:
  schedule:
    # 09:00 UTC — late evening US, after most overnight maintenance windows.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit-links
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run link audit
        env:
          # check.sh POSTs the run to /api/audit/runs. Required — without
          # the token there's no way to persist the run, and seeding
          # issues without it would give a misleading view of which URLs
          # are actually broken.
          AUDIT_WRITE_TOKEN: ${{ secrets.AUDIT_WRITE_TOKEN }}
        run: yarn check-links

      - name: Seed GitHub issues for newly broken links
        # Reads /api/audit/latest + /api/audit/history; depends on the
        # audit step having posted successfully.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node audit/links/seed-issues.mjs
