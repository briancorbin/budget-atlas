name: Audit links

# Runs the public link audit nightly: extracts every external URL cited from
# the codebase, hits each with curl, and opens GitHub issues for newly broken
# ones (deduped against the existing audit:link issues).
#
# Manual runs are also welcome via the "Run workflow" button on the Actions tab.
#
# TODO(audit-ci): add a separate `pull_request` workflow that enforces the
# unified-resolution-log rule — any PR closing an audit:link or audit:review
# issue (via Closes/Fixes/Resolves #N) must add ≥1 row to
# audit/links/reviewed.tsv. Defer until either (a) we forget the convention
# in practice, or (b) someone other than the maintainer files the first
# audit-resolving PR. See audit/links/README.md "unified resolution log".

on:
  schedule:
    # 09:00 UTC — late evening US, after most overnight maintenance windows.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: audit-links
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run link audit
        run: yarn check-links

      - name: Commit refreshed audit data
        run: |
          # Stage status.md + the dated TSV (per-day history) + latest.tsv
          # (stable filename the /sources page imports). The [skip ci] tag
          # prevents this commit from re-triggering the workflow.
          if ! git diff --quiet -- audit/links/status.md audit/links/results/ \
              || [ -n "$(git ls-files --others --exclude-standard audit/links/results/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add audit/links/status.md audit/links/results/
            git commit -m "Audit: refresh link-status data [skip ci]"
            git push
          else
            echo "No audit data changes to commit."
          fi

      - name: Seed GitHub issues for newly broken links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node audit/links/seed-issues.mjs

      - name: Upload audit results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: link-audit-${{ github.run_id }}
          path: audit/links/results/
          retention-days: 90
