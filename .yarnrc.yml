# Use the classic node_modules layout rather than Yarn's default Plug'n'Play.
# PnP is faster but interacts awkwardly with some tooling (Vite plugin
# resolvers, TS strict module resolution, ESLint plugin discovery). We can
# revisit if any of those tools start shipping clean PnP support across the
# board, but for now this is the lowest-friction modern-Yarn setup.
nodeLinker: node-modules
