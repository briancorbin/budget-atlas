<!--
  Master Open Graph / Twitter share card (1200×630). Rendered to
  og-image.png via rsvg-convert; see scripts/render-branding.sh.

  Title is roman (non-italic) Fraunces — italic variable-axis variants
  render wonky through pango/cairo (the SOFT/WONK axes can't be tamed
  via font-variation-settings through this pipeline). The italic A.
  watermark in the bottom-right is OK because it's a single glyph with
  no neighboring kerning to fight.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- No web-font @import: keeping this SVG free of third-party network
       requests. rsvg-convert uses system fontconfig (locally installed
       Fraunces / IBM Plex Sans / Mono) for PNG renders. Browsers viewing
       this SVG source directly will fall back to system fonts. -->
  <!-- Cream bg + thin ink rules top and bottom -->
  <rect width="1200" height="630" fill="#F4EFE3"/>
  <rect x="0" y="0" width="1200" height="6" fill="#1B1815"/>
  <rect x="0" y="624" width="1200" height="6" fill="#1B1815"/>

  <!-- Kicker -->
  <text x="70" y="105"
        font-family="IBM Plex Sans"
        font-size="26" font-weight="500"
        letter-spacing="3"
        fill="#A6261C">THE BUDGET ATLAS · VOL. 2026</text>

  <!-- Headline (roman Fraunces — italic variable axes render wonky via pango).
       Note: pango+fontconfig handles Fraunces' variable axes oddly. At this
       size (100) pango auto-selects the Display opsz cut, where weight=400
       already renders as a heavy Bold. Drop to weight=300 to get the slim
       editorial-Regular look that matches the site headline. The smaller
       supporting line below renders fine at weight=400. -->
  <text x="70" y="265"
        font-family="Fraunces"
        font-size="100" font-weight="300"
        letter-spacing="3.5"
        fill="#1B1815">How Americans actually</text>
  <text x="70" y="365"
        font-family="Fraunces"
        font-size="100" font-weight="300"
        letter-spacing="3.5"
        fill="#1B1815">live on what they earn.</text>

  <!-- Supporting line (trimmed; full sentence lives in og:description) -->
  <text x="70" y="475"
        font-family="Fraunces"
        font-size="30" font-weight="400"
        fill="#1B1815">Plug in an income, a place, a family.</text>

  <!-- URL footer -->
  <text x="70" y="585"
        font-family="IBM Plex Mono"
        font-size="22" font-weight="400"
        letter-spacing="1"
        fill="#7a736b">THEBUDGETATLAS.COM</text>

  <!-- Watermark: italic Fraunces A with a circle period nestled at the
       foot of the right leg, matching the favicon's tight placement so
       all branding PNGs share the same mark. Proportions scaled from the
       favicon (cx=78, cy=76, r=7 on a 100-unit canvas with font-size 92)
       to font-size 260: period offset 11% past A's right edge, ~4% above
       baseline, period radius ~7.6% of font-size. -->
  <text x="1085" y="580"
        text-anchor="end"
        font-family="Fraunces"
        font-size="260" font-weight="500" font-style="italic"
        fill="#A6261C">A</text>
  <circle cx="1105" cy="569" r="20" fill="#A6261C"/>
</svg>
